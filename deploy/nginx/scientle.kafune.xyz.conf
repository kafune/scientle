# Reverse proxy do nginx (host) para o container do app em 127.0.0.1:3000.
# Comece com este bloco HTTP; o certbot --nginx adiciona o SSL automaticamente.

server {
    listen 80;
    listen [::]:80;
    server_name scientle.kafune.xyz;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# (Opcional) Redireciona o domínio antigo para o novo, preservando links já
# compartilhados. Para o HTTPS funcionar, inclua também spotle.kafune.xyz ao
# rodar o certbot (-d scientle.kafune.xyz -d spotle.kafune.xyz).
